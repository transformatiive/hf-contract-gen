<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hi Fly — Contract Preview</title>
<style>
  :root{
    --hi-navy:#1a3a6b; --hi-blue:#77b7d9; --bg:#eef2f7; --bar:#ffffff;
    --line:#d6deea; --ink:#2f4a78; --muted:#8496b5;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex;flex-direction:column}
  .toolbar{position:sticky;top:0;z-index:20;background:var(--bar);border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:14px;padding:12px 22px;box-shadow:0 1px 6px rgba(26,58,107,.06);flex-wrap:wrap}
  .logo{font-family:"Arial Rounded MT Bold","Arial",sans-serif;font-weight:800;font-size:22px;letter-spacing:-.5px}
  .logo .hi{color:var(--hi-navy)} .logo .fly{color:var(--hi-blue)}
  .meta{display:flex;flex-direction:column;line-height:1.25;min-width:0}
  .meta .t{font-size:13px;font-weight:600;color:var(--hi-navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:46vw}
  .meta .s{font-size:11px;color:var(--muted)}
  .picker{border:1px solid var(--line);border-radius:8px;padding:8px 10px;font:inherit;font-size:13px;color:var(--ink);max-width:280px}
  .spacer{flex:1}
  .btn{border:1px solid var(--hi-navy);background:#fff;color:var(--hi-navy);font-weight:600;font-size:13px;
    padding:9px 16px;border-radius:8px;cursor:pointer;transition:.15s;font-family:inherit;white-space:nowrap}
  .btn:hover{background:#f2f6fc}
  .btn.primary{background:var(--hi-navy);color:#fff}
  .btn.primary:hover{background:#15305a}
  .btn:disabled{opacity:.55;cursor:default}
  .stage{flex:1;min-height:0;position:relative}
  #frame{width:100%;height:100%;border:0;background:#525659}
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:14px;color:var(--muted);background:var(--bg);text-align:center;padding:24px}
  .overlay.hidden{display:none}
  .spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--hi-navy);border-radius:50%;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .status{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
    background:var(--hi-navy);color:#fff;padding:10px 18px;border-radius:22px;font-size:13px;
    opacity:0;transition:.25s;pointer-events:none;box-shadow:0 4px 16px rgba(26,58,107,.3);z-index:30}
  .status.show{opacity:1}
</style>
</head>
<body>
  <div class="toolbar">
    <div class="logo"><span class="hi">Hi</span><span class="fly">fly</span></div>
    <div class="meta">
      <span class="t" id="mTitle">ACMI Wet Lease Contract</span>
      <span class="s" id="mSub">Pre-visualizacao</span>
    </div>
    <select id="dealPicker" class="picker" style="display:none" onchange="onPick()"></select>
    <div class="spacer"></div>
    <button class="btn" id="dlBtn" onclick="downloadPdf()">Download PDF</button>
    <button class="btn primary" id="attachBtn" onclick="attachToCrm()">Anexar ao CRM</button>
  </div>

  <div class="stage">
    <iframe id="frame" title="Contract preview"></iframe>
    <div class="overlay" id="overlay">
      <div class="spin"></div>
      <div id="overlayText">A carregar contrato...</div>
    </div>
  </div>

  <div class="status" id="status"></div>

<script>
const FETCH="https://trnsf.up.railway.app/webhook/hifly-contract-fetch";
const GEN="https://trnsf.up.railway.app/webhook/hifly-generate-contract";
let DEALID="", DEALNAME="";

function qp(k){return new URLSearchParams(location.search).get(k);}
function toast(m){const s=document.getElementById('status');s.textContent=m;s.classList.add('show');setTimeout(()=>s.classList.remove('show'),2600);}
function showOverlay(t){const o=document.getElementById('overlay');document.getElementById('overlayText').textContent=t;o.classList.remove('hidden');}
function hideOverlay(){document.getElementById('overlay').classList.add('hidden');}

async function boot(){
  DEALID=(qp('deal_id')||'').trim();
  if(DEALID){ loadDeal(DEALID); }
  else { showPicker(); }
}

async function showPicker(){
  const sel=document.getElementById('dealPicker'); sel.style.display='';
  showOverlay('Escolhe um Deal para pre-visualizar o contrato.');
  try{
    const d=await (await fetch(FETCH)).json();
    sel.innerHTML='<option value="">-- Escolher Deal --</option>'+
      (d.deals||[]).map(x=>'<option value="'+x.id+'">'+(x.name||x.id)+'</option>').join('');
  }catch(e){ toast('Falha a listar Deals'); }
}
function onPick(){ const id=document.getElementById('dealPicker').value; if(id){ DEALID=id; loadDeal(id); } }

async function loadDeal(id){
  showOverlay('A gerar pre-visualizacao...');
  fetch(FETCH+'?deal_id='+encodeURIComponent(id)).then(r=>r.json()).then(d=>{
    const f=d.fields||{};
    DEALNAME=f.agreement_no||id;
    document.getElementById('mTitle').textContent='ACMI Wet Lease - '+DEALNAME;
    document.getElementById('mSub').textContent=(f.lessee_name||'')+(f.ac_type?(' - '+f.ac_type):'');
  }).catch(function(){});
  const frame=document.getElementById('frame');
  frame.onload=function(){ hideOverlay(); };
  frame.src='/api/pdf?deal_id='+encodeURIComponent(id)+'#toolbar=1&view=FitH';
  setTimeout(hideOverlay, 12000);
}

async function downloadPdf(){
  if(!DEALID){ toast('Escolhe um Deal primeiro'); return; }
  const b=document.getElementById('dlBtn'); const t=b.textContent; b.textContent='A gerar...'; b.disabled=true;
  try{
    const r=await fetch('/api/pdf?deal_id='+encodeURIComponent(DEALID));
    if(!r.ok) throw new Error(r.status);
    const blob=await r.blob(); const a=document.createElement('a');
    a.href=URL.createObjectURL(blob); a.download='ACMI_'+DEALNAME+'.pdf';
    document.body.appendChild(a); a.click(); a.remove();
    toast('PDF descarregado');
  }catch(e){ toast('Falha ao gerar PDF'); }
  finally{ b.textContent=t; b.disabled=false; }
}

async function attachToCrm(){
  if(!DEALID){ toast('Escolhe um Deal primeiro'); return; }
  if(!confirm('Anexar o contrato ao Deal no Zoho CRM?')) return;
  const b=document.getElementById('attachBtn'); const t=b.textContent; b.textContent='A anexar...'; b.disabled=true;
  try{
    const d=await (await fetch(GEN+'?deal_id='+encodeURIComponent(DEALID)+'&attach=1',{cache:'no-store'})).json();
    toast(d.attached?'Anexado ao CRM':'Concluido');
  }catch(e){ toast('Falha ao anexar'); }
  finally{ b.textContent=t; b.disabled=false; }
}

boot();
</script>
</body>
</html>
